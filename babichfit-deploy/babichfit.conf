server {
    server_name babichfit.pro www.babichfit.pro;

    root /var/www/babichfit;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/lead {
        proxy_pass http://127.0.0.1:8891;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~* \.(jpg|jpeg|png|svg|gif|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/babichfit.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babichfit.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name babichfit.pro www.babichfit.pro;
    return 301 https://$host$request_uri;
}
